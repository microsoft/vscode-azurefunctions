# Configure CLI package managers (npm, NuGet, pip) to use the Azure Artifacts feed mirror.
# Requires the pipeline variable `feedBaseUrl` to be set.

steps:
  - pwsh: |
      $feedBase = "$(feedBaseUrl)"

      # npm: point user-level registry at the feed
      npm config set registry "${feedBase}/npm/registry/"

      # NuGet: write user-level config with <clear/> to block machine-level sources
      $nugetConfigDir = if ($IsWindows) { "$env:APPDATA/NuGet" } else { "$HOME/.nuget/NuGet" }
      New-Item -ItemType Directory -Path $nugetConfigDir -Force | Out-Null
      $nugetConfig = @"
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <packageSources>
          <clear />
          <add key="AzureArtifacts" value="${feedBase}/nuget/v3/index.json" />
        </packageSources>
      </configuration>
      "@
      $nugetConfig | Set-Content -Path (Join-Path $nugetConfigDir "NuGet.Config")

      # Verify configuration
      Write-Host "--- npm config ---"
      npm config get registry
      Write-Host "--- NuGet sources ---"
      dotnet nuget list source

      # pip: set index URL with embedded basic auth
      $pipUrl = $feedBase -replace 'https://', "https://build:$($env:SYSTEM_ACCESSTOKEN)@"
      Write-Host "##vso[task.setvariable variable=PIP_INDEX_URL]${pipUrl}/pypi/simple/"
    displayName: "📦 Configure package manager feed mirrors"
    condition: and(succeeded(), ne(variables['feedBaseUrl'], ''))
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  - task: npmAuthenticate@0
    displayName: "📦 Authenticate npm feeds"
    condition: and(succeeded(), ne(variables['feedBaseUrl'], ''))
    inputs:
      workingFile: $(HOME)/.npmrc

  - task: NuGetAuthenticate@1
    displayName: "📦 Authenticate NuGet feeds"
    condition: and(succeeded(), ne(variables['feedBaseUrl'], ''))

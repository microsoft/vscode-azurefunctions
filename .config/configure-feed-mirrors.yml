# Configure CLI package managers (NuGet, pip) to use the Azure Artifacts feed mirror.
# npm is handled by the shared template's npmFeed parameter.
# Requires the pipeline variable `feedBaseUrl` to be set.

steps:
  - pwsh: |
      $feedBase = "$(feedBaseUrl)"

      # NuGet: write config with <clear/> to block all other sources.
      # Place in multiple locations so dotnet finds it regardless of CWD:
      #   - user-level (standard NuGet config path)
      #   - workspace root (covers dotnet commands run from the repo)
      #   - /tmp/ (covers dotnet commands run in temp project directories)
      $nugetConfig = "<?xml version=`"1.0`" encoding=`"utf-8`"?>`n<configuration>`n  <packageSources>`n    <clear />`n    <add key=`"AzureArtifacts`" value=`"${feedBase}/nuget/v3/index.json`" />`n  </packageSources>`n</configuration>"
      $userConfigDir = if ($IsWindows) { "$env:APPDATA/NuGet" } else { "$HOME/.nuget/NuGet" }
      New-Item -ItemType Directory -Path $userConfigDir -Force | Out-Null
      $nugetConfig | Set-Content -Path (Join-Path $userConfigDir "NuGet.Config")
      $nugetConfig | Set-Content -Path "$(working_directory)/nuget.config"
      $tempDir = if ($IsWindows) { $env:TEMP } else { "/tmp" }
      $nugetConfig | Set-Content -Path (Join-Path $tempDir "nuget.config")

      # Verify configuration
      Write-Host "--- NuGet sources (from workspace) ---"
      dotnet nuget list source
      Write-Host "--- NuGet config locations ---"
      Write-Host "  user-level: $(Join-Path $userConfigDir 'NuGet.Config')"
      Write-Host "  workspace:  $(working_directory)/nuget.config"
      Write-Host "  temp:       $(Join-Path $tempDir 'nuget.config')"
    displayName: "📦 Configure NuGet feed mirror"
    condition: and(succeeded(), ne(variables['feedBaseUrl'], ''))

  - task: NuGetAuthenticate@1
    displayName: "📦 Authenticate NuGet feeds"
    condition: and(succeeded(), ne(variables['feedBaseUrl'], ''))

  - pwsh: node "$(working_directory)/.config/test-feed-mirrors.mjs"
    displayName: "🔍 Test feed mirror connectivity"
    condition: and(succeeded(), ne(variables['feedBaseUrl'], ''))
    env:
      FEED_BASE_URL: $(feedBaseUrl)
      FEED_PAT: $(System.AccessToken)